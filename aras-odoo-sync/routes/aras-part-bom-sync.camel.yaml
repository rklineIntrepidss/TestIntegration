- route:
    id: aras-part-bom-ingress
    from:
      uri: "jms:queue:{{integration.artemis.queue.in}}"
      steps:
        - setHeader:
            name: integrationFlow
            constant: "aras-part-bom-to-odoo"
        - setHeader:
            name: sourceSystem
            constant: "aras"
        - setHeader:
            name: targetSystem
            constant: "odoo"
        - log:
            message: "Received Aras part/BOM message with correlation ${header.CamelJmsMessageID}"
            loggingLevel: INFO
        - multicast:
            parallelProcessing: false
            steps:
              - to: "jms:queue:{{integration.artemis.queue.product}}"
              - to: "jms:queue:{{integration.artemis.queue.bom}}"

- route:
    id: aras-product-sync
    from:
      uri: "jms:queue:{{integration.artemis.queue.product}}"
      steps:
        - log:
            message: "Preparing Odoo product payload for Aras item ${body}"
            loggingLevel: INFO
        - to: "direct:odoo-product-upsert"

- route:
    id: aras-bom-sync
    from:
      uri: "jms:queue:{{integration.artemis.queue.bom}}"
      steps:
        - log:
            message: "Preparing Odoo BOM payload for Aras item ${body}"
            loggingLevel: INFO
        - to: "direct:odoo-bom-upsert"

- route:
    id: odoo-product-upsert
    from:
      uri: "direct:odoo-product-upsert"
      steps:
        - log:
            message: "Scaffold placeholder for Odoo product create/update using reference mapping"
            loggingLevel: INFO

- route:
    id: odoo-bom-upsert
    from:
      uri: "direct:odoo-bom-upsert"
      steps:
        - log:
            message: "Scaffold placeholder for Odoo BOM create/update using reference mapping"
            loggingLevel: INFO

- route:
    id: aras-sync-retry
    from:
      uri: "jms:queue:{{integration.artemis.queue.retry}}"
      steps:
        - log:
            message: "Retry message received for Aras to Odoo sync"
            loggingLevel: WARN
        - to: "jms:queue:{{integration.artemis.queue.in}}"

- route:
    id: aras-sync-dlq
    from:
      uri: "jms:queue:{{integration.artemis.queue.dlq}}"
      steps:
        - log:
            message: "Dead letter message received for Aras to Odoo sync: ${body}"
            loggingLevel: ERROR
